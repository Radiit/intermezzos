<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intermezzo — Daily Curious Facts</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --cream:#f5f0eb; --paper:#fffef9; --ink:#2d2a26; --muted:#8b8680; --rust:#c24e2a; --sage:#6b8e6b; --gold:#c9a959; --border:#e6e2dd; }
    @media (prefers-color-scheme: dark) { :root { --cream:#1a1816; --paper:#23201d; --ink:#f0ede9; --muted:#a8a29a; --rust:#e0623a; --sage:#8fb88f; --gold:#dcc074; --border:#3a3530; } }
    *{margin:0;padding:0;box-sizing:border-box} body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--ink);line-height:1.7;padding-bottom:80px}
    header{background:var(--paper);padding:60px 24px 40px;text-align:center;border-bottom:3px solid var(--ink)} .masthead{font-family:'Playfair Display',serif;font-size:clamp(42px,10vw,72px);font-weight:800;letter-spacing:-2px;line-height:0.95;margin-bottom:8px} .tagline{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;font-weight:500}.divider{width:60px;height:3px;background:var(--rust);margin:24px auto}
    .featured{background:linear-gradient(135deg,var(--rust),#a94424);color:white;padding:48px 28px;margin:16px;border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,0.15);position:relative;overflow:hidden} .featured::before{content:'✨';position:absolute;top:20px;right:24px;font-size:48px;opacity:0.3} .featured-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;opacity:0.9;margin-bottom:16px;font-weight:600} .featured-fact{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,26px);line-height:1.4;margin-bottom:20px;font-weight:400} .featured-btn{display:inline-block;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);color:white;padding:10px 20px;border-radius:2px;text-decoration:none;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border:1px solid rgba(255,255,255,0.3);cursor:pointer} .featured-btn:hover{background:rgba(255,255,255,0.3)}
    .section-header{display:flex;align-items:center;gap:16px;padding:0 24px;margin:40px 0 24px} .section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)} .section-title{font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;white-space:nowrap}
    .search-container{padding:0 24px;margin-bottom:24px} .search-box{width:100%;background:var(--paper);border:2px solid var(--border);border-radius:4px;padding:16px 20px;font-size:16px;color:var(--ink);font-family:inherit} .search-box:focus{outline:none;border-color:var(--rust)}
    .filters{display:flex;gap:10px;overflow-x:auto;padding:0 24px 24px;scrollbar-width:none} .filters::-webkit-scrollbar{display:none} .filter-btn{background:var(--paper);border:1px solid var(--border);color:var(--ink);padding:10px 18px;border-radius:100px;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer} .filter-btn:hover,.filter-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;padding:0 24px} .card{background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:28px;cursor:pointer;transition:all 0.3s;position:relative;display:flex;flex-direction:column} .card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,0.12);border-color:var(--gold)}
    .card-badge{position:absolute;top:16px;right:16px;background:var(--sage);color:white;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:4px 10px;border-radius:100px} .card-badge.unverified{background:var(--gold);color:var(--ink)}
    .card-topic{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--rust);font-weight:700;margin-bottom:14px} .card-fact{font-family:'Playfair Display',serif;font-size:17px;line-height:1.6;color:var(--ink);flex:1;margin-bottom:20px}
    .card-footer{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);padding-top:16px;border-top:1px solid var(--border)} .read-more{color:var(--rust);font-weight:600;text-decoration:none}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);display:none;place-items:center;z-index:2000;padding:24px} .modal-overlay.active{display:grid} .modal{background:var(--paper);border-radius:8px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:40px;position:relative}
    .close-btn{position:absolute;top:20px;right:20px;background:none;border:none;font-size:28px;color:var(--muted);cursor:pointer;width:40px;height:40px;border-radius:50%} .close-btn:hover{background:var(--cream)}
    .modal-topic{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--rust);font-weight:700;margin-bottom:20px} .modal-fact{font-family:'Playfair Display',serif;font-size:20px;line-height:1.6;margin-bottom:32px}
    .sources-section{background:var(--cream);padding:24px;border-radius:6px;border-left:3px solid var(--gold);margin-top:24px} .sources-section h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:16px} .source-link{display:block;font-size:14px;color:var(--rust);text-decoration:none;padding:10px 0;border-bottom:1px solid var(--border)} .source-link:hover{padding-left:8px}
    .install-banner{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:2px solid var(--ink);padding:20px 24px;display:none;align-items:center;gap:16px;box-shadow:0 -8px 32px rgba(0,0,0,0.1);z-index:1000} .install-banner.show{display:flex} .install-text{flex:1;font-size:14px} .install-btn{background:var(--ink);color:var(--paper);border:none;padding:12px 24px;border-radius:2px;font-weight:600;font-size:13px;cursor:pointer} .close-install{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer}
    @media(max-width:640px){header{padding:40px 20px 32px} .featured{padding:36px 20px;margin:12px} .grid{grid-template-columns:1fr} .modal{padding:32px 24px}}
  </style>
</head>
<body>
  <header><h1 class="masthead">Intermezzo</h1><p class="tagline">Daily Curiosities from Science & History</p><div class="divider"></div></header>
  <section class="featured"><div class="featured-label">Fact of the Moment</div><div class="featured-fact" id="randomFact">Loading...</div><button class="featured-btn" onclick="loadRandomFact()">🔄 Another Fact</button></section>
  <div class="section-header"><div class="section-line"></div><div class="section-title">The Archive</div><div class="section-line"></div></div>
  <div class="search-container"><input type="text" class="search-box" id="searchBox" placeholder="Search curious facts..."/></div>
  <div class="filters" id="filters"></div>
  <main class="grid" id="grid"></main>
  <div class="install-banner" id="installBanner"><div class="install-text"><strong>📲 Add to Home Screen</strong><br>Get daily curiosities</div><button class="install-btn" onclick="showInstallGuide()">Install</button><button class="close-install" onclick="dismissInstall()">×</button></div>
  <div class="modal-overlay" id="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><button class="close-btn" onclick="closeModal()">×</button><div class="modal-topic" id="mTopic"></div><div class="modal-fact" id="mFact"></div><div class="sources-section" id="mSources"></div></div></div>
  <script src="app.js"></script>
</body>
</html>
