<!-- Embeddable Intermezzo Widget -->
<!-- Copy-paste this anywhere -->
<div id="intermezzo-widget" style="
  max-width: 320px; background: linear-gradient(135deg, #ff6b9d, #ff8fa3);
  padding: 20px; border-radius: 16px; color: white; font-family: system-ui, sans-serif;
">
  <div style="font-size: 11px; opacity: 0.9; margin-bottom: 8px; text-transform: uppercase;">✨ Fact of the Day</div>
  <p id="widget-fact" style="font-size: 14px; line-height: 1.5; margin: 0;">Loading...</p>
  <a href="https://gustavoibenc.github.io/intermezzos/" target="_blank" 
     style="display: inline-block; margin-top: 12px; font-size: 12px; color: white; opacity: 0.9; text-decoration: none;">
    More facts →
  </a>
</div>
<script>
  fetch('https://gustavoibenc.github.io/intermezzos/intermezzos.json')
    .then(r => r.json())
    .then(d => {
      const fact = d.delivered?.[0]?.fact || 'No facts yet';
      document.getElementById('widget-fact').textContent = fact.length > 150 ? fact.substring(0, 150) + '...' : fact;
    })
    .catch(() => {});
</script>
